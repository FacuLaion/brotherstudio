# Brother Studios — Nginx reverse proxy
# Copy to: /etc/nginx/sites-available/brotherstudio.pro
# Then:    sudo ln -s /etc/nginx/sites-available/brotherstudio.pro /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Run certbot AFTER this is enabled and DNS resolves:
#          sudo certbot --nginx -d brotherstudio.pro -d www.brotherstudio.pro
# Certbot will add the 443 server block and the 80->443 redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name brotherstudio.pro www.brotherstudio.pro;

    # Compress text assets (NOT images/video — already compressed)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;

    client_max_body_size 25m;

    # Immutable, fingerprinted Next.js static assets → cache 1 year
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Heavy media (videos / frame sequences) when you add them under /public/media
    location /media/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
